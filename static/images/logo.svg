<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 48" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6E85DF"/>
      <stop offset="50%" stop-color="#40A5EB"/>
      <stop offset="100%" stop-color="#52BBB1"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40A5EB"/>
      <stop offset="100%" stop-color="#52BBB1"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6E85DF"/>
      <stop offset="100%" stop-color="#52BBB1"/>
    </linearGradient>
  </defs>
  <!-- Icon: stylized orbiting rings representing "verse" / multiverse -->
  <g transform="translate(24, 24)">
    <!-- Outer ring -->
    <ellipse rx="18" ry="8" stroke="url(#ringGrad)" stroke-width="1.8" fill="none" transform="rotate(-25)" opacity="0.7"/>
    <!-- Middle ring -->
    <ellipse rx="14" ry="7" stroke="url(#ringGrad)" stroke-width="1.8" fill="none" transform="rotate(25)" opacity="0.85"/>
    <!-- Core dot -->
    <circle r="4.5" fill="url(#dotGrad)"/>
    <!-- Small orbiting dots -->
    <circle cx="16" cy="-3" r="2" fill="#6E85DF" opacity="0.9"/>
    <circle cx="-12" cy="6" r="1.5" fill="#52BBB1" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="52" y="33" font-family="'Lato', sans-serif" font-weight="900" font-size="30" letter-spacing="-0.5">
    <tspan fill="url(#logoGrad)">Mio</tspan><tspan fill="#f0f0f2">Verse</tspan><tspan fill="#52BBB1" font-weight="400">.ai</tspan>
  </text>
</svg>
