<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="globe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4facfe" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#7c3aed" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.4">
    <circle cx="50" cy="30" r="1"/><circle cx="150" cy="80" r="1.2"/>
    <circle cx="300" cy="40" r="0.8"/><circle cx="500" cy="60" r="1"/>
    <circle cx="650" cy="35" r="1.3"/><circle cx="750" cy="90" r="0.9"/>
    <circle cx="100" cy="380" r="1"/><circle cx="700" cy="400" r="1.1"/>
    <circle cx="380" cy="420" r="0.7"/><circle cx="200" cy="200" r="1"/>
    <circle cx="620" cy="180" r="0.8"/><circle cx="80" cy="280" r="1.2"/>
    <circle cx="720" cy="300" r="0.9"/><circle cx="450" cy="50" r="1.1"/>
  </g>

  <!-- Aura glow behind globe -->
  <circle cx="400" cy="210" r="180" fill="url(#aura)"/>

  <!-- Globe outline -->
  <g fill="none" stroke="url(#globe)" stroke-width="1.5" opacity="0.6">
    <!-- Main circle -->
    <circle cx="400" cy="210" r="120"/>
    <!-- Latitude lines -->
    <ellipse cx="400" cy="210" rx="120" ry="30"/>
    <ellipse cx="400" cy="210" rx="120" ry="60"/>
    <ellipse cx="400" cy="210" rx="120" ry="90"/>
    <!-- Longitude lines -->
    <ellipse cx="400" cy="210" rx="30" ry="120"/>
    <ellipse cx="400" cy="210" rx="60" ry="120"/>
    <ellipse cx="400" cy="210" rx="90" ry="120"/>
  </g>

  <!-- Glowing nodes on globe -->
  <g filter="url(#blur1)">
    <circle cx="340" cy="150" r="4" fill="#4facfe"/>
    <circle cx="430" cy="130" r="3.5" fill="#00f2fe"/>
    <circle cx="470" cy="200" r="4" fill="#7c3aed"/>
    <circle cx="360" cy="260" r="3" fill="#4facfe"/>
    <circle cx="450" cy="280" r="3.5" fill="#00f2fe"/>
    <circle cx="320" cy="200" r="4" fill="#7c3aed"/>
    <circle cx="400" cy="100" r="3" fill="#4facfe"/>
    <circle cx="400" cy="320" r="3" fill="#00f2fe"/>
  </g>
  <!-- Solid nodes -->
  <g fill="white">
    <circle cx="340" cy="150" r="2.5"/>
    <circle cx="430" cy="130" r="2"/>
    <circle cx="470" cy="200" r="2.5"/>
    <circle cx="360" cy="260" r="2"/>
    <circle cx="450" cy="280" r="2"/>
    <circle cx="320" cy="200" r="2.5"/>
    <circle cx="400" cy="100" r="2"/>
    <circle cx="400" cy="320" r="2"/>
  </g>

  <!-- Connections between nodes -->
  <g stroke="url(#glow)" stroke-width="0.8" opacity="0.5">
    <line x1="340" y1="150" x2="430" y2="130"/>
    <line x1="430" y1="130" x2="470" y2="200"/>
    <line x1="470" y1="200" x2="450" y2="280"/>
    <line x1="450" y1="280" x2="360" y2="260"/>
    <line x1="360" y1="260" x2="320" y2="200"/>
    <line x1="320" y1="200" x2="340" y2="150"/>
    <line x1="340" y1="150" x2="470" y2="200"/>
    <line x1="320" y1="200" x2="450" y2="280"/>
    <line x1="400" y1="100" x2="340" y2="150"/>
    <line x1="400" y1="100" x2="430" y2="130"/>
    <line x1="400" y1="320" x2="360" y2="260"/>
    <line x1="400" y1="320" x2="450" y2="280"/>
  </g>

  <!-- Floating data streams (left side) -->
  <g opacity="0.4" fill="none" stroke="#4facfe" stroke-width="1">
    <path d="M80,180 Q150,160 280,190" stroke-dasharray="4,4"/>
    <path d="M60,220 Q140,200 280,210" stroke-dasharray="3,5"/>
    <path d="M100,260 Q160,250 280,240" stroke-dasharray="4,3"/>
  </g>

  <!-- Floating data streams (right side) -->
  <g opacity="0.4" fill="none" stroke="#00f2fe" stroke-width="1">
    <path d="M520,190 Q600,170 720,180" stroke-dasharray="4,4"/>
    <path d="M520,210 Q610,200 740,220" stroke-dasharray="3,5"/>
    <path d="M520,240 Q590,250 700,260" stroke-dasharray="4,3"/>
  </g>

  <!-- Left label: Text Input -->
  <g transform="translate(60,160)">
    <rect x="0" y="0" width="100" height="28" rx="6" fill="#7c3aed" opacity="0.3" stroke="#7c3aed" stroke-width="0.5"/>
    <text x="50" y="18" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="11">Text Input</text>
  </g>

  <!-- Right label: 3D World -->
  <g transform="translate(640,160)">
    <rect x="0" y="0" width="100" height="28" rx="6" fill="#4facfe" opacity="0.3" stroke="#4facfe" stroke-width="0.5"/>
    <text x="50" y="18" text-anchor="middle" fill="#bae6fd" font-family="monospace" font-size="11">3D World</text>
  </g>

  <!-- Left label: Image Ref -->
  <g transform="translate(40,240)">
    <rect x="0" y="0" width="100" height="28" rx="6" fill="#7c3aed" opacity="0.3" stroke="#7c3aed" stroke-width="0.5"/>
    <text x="50" y="18" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="11">Image Ref</text>
  </g>

  <!-- Right label: Navigate -->
  <g transform="translate(660,240)">
    <rect x="0" y="0" width="100" height="28" rx="6" fill="#4facfe" opacity="0.3" stroke="#4facfe" stroke-width="0.5"/>
    <text x="50" y="18" text-anchor="middle" fill="#bae6fd" font-family="monospace" font-size="11">Navigate</text>
  </g>

  <!-- Bottom title -->
  <text x="400" y="400" text-anchor="middle" fill="white" font-family="'Lato', sans-serif" font-size="22" font-weight="700" letter-spacing="3">
    SEKAI — Interactive World Model
  </text>
  <text x="400" y="425" text-anchor="middle" fill="#94a3b8" font-family="'Lato', sans-serif" font-size="12" letter-spacing="1">
    DiT-based Diffusion  ·  24fps @ 720p  ·  Real-time Generation
  </text>
</svg>
